defaults:
  - dataset: sleep_edf
  - model: default
  - loss: default
  - _self_

seed: 42
num_workers: 24

train:
  epochs: 80
  batch_size: 128
  lr: 2e-4
  weight_decay: 1e-4
  warmup_epochs: 5
  max_grad_norm: 1.0
  accumulate_grad_batches: 2  # effective batch 256
  early_stopping_patience: 12
  scheduler: cosine

eval:
  batch_size: 256
  metrics: [f1_macro, auroc, ece]

wandb:
  project: causal-biosignal-fm
  entity: null
  mode: online  # set to "disabled" for debugging

paths:
  data_root: /workspace/data
  output_dir: /workspace/outputs
  checkpoint_dir: /workspace/checkpoints

hardware:
  gpus: 1
  precision: bf16-mixed  # bf16 native on 5090/A100, faster than fp16
  compile: false  # disable torch.compile — inductor has issues with complex STFT ops
  compile_mode: reduce-overhead
