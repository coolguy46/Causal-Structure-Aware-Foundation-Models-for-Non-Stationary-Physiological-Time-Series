lambda_recon: 1.0
lambda_causal: 0.2
lambda_task: 1.0
causal_every_n_steps: 4  # compute expensive causal loss every N steps (saves ~30% wall time)

reconstruction:
  type: mse_spectral  # MSE in STFT domain

causal_consistency:
  n_interventions: 3  # reduced from 5 — still effective when batched
  intervention_type: zero  # zero-out node embedding
  use_edge_loss: true  # counterfactual edge necessity
  edge_loss_weight: 0.5
  use_invariance_loss: true  # distributional invariance (IRM-inspired)
  invariance_loss_weight: 0.3
  n_invariance_values: 3  # reduced from 5

task:
  type: cross_entropy
  label_smoothing: 0.1
