name: chbmit
type: eeg
path: ${paths.data_root}/chbmit
sample_rate: 256
channels: 23  # CHB-MIT standard montage
window_sec: 2.0
window_samples: 512  # 256 * 2
stride_sec: 1.0
bandpass_low: 0.5
bandpass_high: 50.0
num_classes: 2  # seizure / non-seizure
task: classification
split_file: ${paths.data_root}/chbmit/splits.json

# 23ch × 5bands = 115 tokens (default model) → fits large batches on 32GB
train_batch_size: 64
eval_batch_size: 128
accumulate_grad_batches: 2  # effective batch still 128
preload: true  # ~31GB in float16, fits 64GB RAM
