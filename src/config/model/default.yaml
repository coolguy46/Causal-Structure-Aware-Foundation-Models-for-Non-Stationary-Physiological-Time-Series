model_class: causal  # causal | patchtst | vanilla_tf | static_gnn | corr_graph | raw_waveform
d_token: 512
n_bands: 5  # delta, theta, alpha, beta, gamma

tokenizer:
  stft_n_fft: 512
  stft_hop_length: 32
  stft_win_length: 512
  n_temporal_pools: 4  # 4 temporal buckets → 4x tokens → heavy attention
  bands:
    delta: [0.5, 4.0]
    theta: [4.0, 8.0]
    alpha: [8.0, 13.0]
    beta: [13.0, 30.0]
    gamma: [30.0, 50.0]

graph:
  n_layers: 6
  n_heads: 16
  d_model: ${..d_token}
  dropout: 0.1
  sparsity_threshold: 0.5
  l1_lambda: 0.01
  dag_constraint: true

transformer:
  n_layers: 20
  n_heads: 16
  d_model: ${..d_token}
  d_ff: 2048
  dropout: 0.1
  max_seq_len: 2048
  gradient_checkpointing: true  # trades compute for VRAM headroom

adapter:
  hidden_dim: 512
  n_layers: 4
  residual: true

classifier:
  hidden_dim: 1536
  dropout: 0.3
